        .btn-danger { background: #D32F2F; color: white; padding: 6px 14px; font-size: 13px; }

        th, td { border: 1px solid #ddd; padding: 10px 12px; text-align: left; white-space: nowrap; }

        .alert { padding: 12px 16px; border-radius: 8px; margin: 10px 0; font-weight: 500; }
        .alert-success { background: #E8F5E9; color: #1B5E20; border-left: 4px solid #1B5E20; }
        .alert-error { background: #FFEBEE; color: #C62828; border-left: 4px solid #C62828; }
        .alert-info { background: #E3F2FD; color: #1565C0; border-left: 4px solid #1565C0; }
        .login-box { max-width: 400px; margin: 40px auto; }
        #userBar { background: #0D3B0F; color: white; padding: 8px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }

        .tab-btn.active { background: #1B5E20; color: white; }
        .cabinet-card { text-align: center; padding: 20px; }

        .embassy-block { background: #E8F5E9; border-left: 4px solid #1B5E20; padding: 16px 20px; border-radius: 8px; }

        .donation-highlight { background: #FFF8E1; border: 2px dashed #FFD700; border-radius: 10px; padding: 16px; margin: 12px 0; }
        @media (max-width: 768px) { nav a { padding: 10px 12px; font-size: 13px; } .stat-card .number { font-size: 2em; } table { font-size: 13px; } }
    </style>
</head>

async function initSession() {
    const { data: { session } } = await db.auth.getSession();

async function loadProfile() {
    if (!currentUser) return;
    const { data } = await db.from('users').select('*').eq('id', currentUser.id).single();
    currentProfile = data;

function updateUserBar() {
    const nameEl = document.getElementById('userBarName');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    if (currentUser && currentProfile) {

        loginBtn.style.display = 'none'; logoutBtn.style.display = 'inline';
    } else {
        nameEl.textContent = 'Not logged in';

}
async function doLogout() {
    await db.auth.signOut(); currentUser = null; currentProfile = null;

async function loadAnnouncements() {
    const { data } = await db.from('announcements').select('message').eq('is_active', true).limit(3);

async function showPage(page) {
    const content = document.getElementById('content');
    content.innerHTML = '<div class="card"><p>Loading...</p></div>';

        if (page==='home') await renderHome(content);

        else if (page==='donations') await renderDonations(content);
        else if (page==='elections') await renderElections(content);

        else if (page==='news') await renderNews(content);

    } catch(err) { content.innerHTML = '<div class="card"><div class="alert alert-error">Error: '+err.message+'</div></div>'; }
}

async function renderLogin(container) {

    <button class="btn-primary" onclick="doLogin()">Login</button>
    <p style="text-align:center;margin-top:16px;font-size:14px">No account? <a onclick="showPage('register')" style="cursor:pointer;color:#1B5E20">Register here</a></p>
    </div></div>`;
}
async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const msg = document.getElementById('loginMsg');
    if (!email||!password){msg.innerHTML='<div class="alert alert-error">Fill all fields.</div>';return;}
    msg.innerHTML='<div class="alert alert-info">Logging in...</div>';
    const {data,error} = await db.auth.signInWithPassword({email,password});
    if (error){msg.innerHTML='<div class="alert alert-error">❌ '+error.message+'</div>';}
    else {currentUser=data.user;await loadProfile();updateUserBar();msg.innerHTML='<div class="alert alert-success">✅ Welcome!</div>';setTimeout(()=>showPage('home'),1000);}
}

          async function renderAdmin(container) {
    if(!currentUser){container.innerHTML=`<div class="card login-box"><h2>🛡️ Admin Login</h2><div id="loginMsg"></div>
    <label>Email</label><input type="email" id="loginEmail" value="admin@opc.com">

async function adminTab(tab,btn) {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    if(btn)btn.classList.add('active');
    const area=document.getElementById('adminContent');
    area.innerHTML='<p style="color:#666">Loading...</p>';
    if(tab==='members')await adminMembers(area);
    else if(tab==='reports')await adminReports(area);
    else if(tab==='donations')await adminDonations(area);
    else if(tab==='elections')await adminElections(area);
    else if(tab==='cabinet')await adminCabinet(area);
    else if(tab==='news')await adminNews(area);
    else if(tab==='events')await adminEvents(area);
    else if(tab==='announcements')await adminAnnouncements(area);
    else if(tab==='embassy')await adminEmbassy(area);
}
async function adminMembers(area) {
    const {data:members}=await db.from('users').select('*').neq('role','admin').order('registration_date',{ascending:false});
    area.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:10px">
    <h3 style="margin:0">Members (${members?.length||0})</h3>
    <button class="btn-secondary btn-small" onclick="exportMembersCSV()">📥 Export CSV</button></div>
    <table><thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Payment</th><th>Actions</th></tr></thead><tbody>
    ${members?.length?members.map(m=>`<tr><td>${m.name}</td><td>${m.email}</td>
    <td><span class="badge badge-${m.status==='approved'?'approved':m.status==='rejected'?'rejected':'pending'}">${m.status}</span></td>
    <td>${m.payment_status||'–'}</td>
    <td>${m.status!=='approved'?`<button class="btn-success btn-small" onclick="adminApproveMember('${m.id}')">✅</button>`:''}
    ${m.status!=='rejected'?`<button class="btn-danger btn-small" onclick="adminRejectMember('${m.id}')">❌</button>`:''}
    <button class="btn-danger btn-small" onclick="adminDeleteMember('${m.id}')">🗑️</button></td></tr>`).join(''):'<tr><td colspan="5" style="text-align:center;color:#666">No members.</td></tr>'}
    </tbody></table>`;
}
async function adminApproveMember(id){if(!confirm('Approve?'))return;const memberId='OPC-'+Date.now().toString().slice(-6);await db.from('users').update({status:'approved',member_id:memberId,payment_status:'paid',approval_date:new Date().toISOString()}).eq('id',id);await adminTab('members',null);}
async function adminRejectMember(id){if(!confirm('Reject?'))return;await db.from('users').update({status:'rejected'}).eq('id',id);await adminTab('members',null);}
async function adminDeleteMember(id){if(!confirm('Delete permanently?'))return;await db.from('users').delete().eq('id',id);await adminTab('members',null);}
async function exportMembersCSV(){const {data}=await db.from('users').select('name,email,phone,district,city,blood_group,status,payment_status,registration_date').neq('role','admin');if(!data)return;const csv=['Name,Email,Phone,District,City,Blood,Status,Payment,Date',...data.map(u=>`"${u.name}","${u.email}","${u.phone||''}","${u.district||''}","${u.city||''}","${u.blood_group||''}","${u.status}","${u.payment_status}","${new Date(u.registration_date).toLocaleDateString()}""`)].join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='opc_members.csv';a.click();}
async function adminReports(area){const {data:reports}=await db.from('reports').select('*,users(name)').order('created_at',{ascending:false});area.innerHTML=`<h3>Reports (${reports?.length||0})</h3><table><thead><tr><th>Member</th><th>Type</th><th>Description</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead><tbody>${reports?.length?reports.map(r=>`<tr><td>${r.users?.name||'–'}</td><td>${r.type}</td><td>${(r.description||'').substring(0,50)}</td><td>${new Date(r.date).toLocaleDateString()}</td><td><span class="badge badge-${r.status==='resolved'?'resolved':'pending'}">${r.status}</span></td><td>${r.status!=='resolved'?`<button class="btn-success btn-small" onclick="resolveReport('${r.id}')">✅</button>`:''}<button class="btn-danger btn-small" onclick="deleteReport('${r.id}')">🗑️</button></td></tr>`).join(''):'<tr><td colspan="6" style="text-align:center;color:#666">No reports.</td></tr>'}</tbody></table>`;}
async function resolveReport(id){await db.from('reports').update({status:'resolved'}).eq('id',id);await adminTab('reports',null);}
async function deleteReport(id){if(!confirm('Delete?'))return;await db.from('reports').delete().eq('id',id);await adminTab('reports',null);}
async function adminDonations(area){const {data:donations}=await db.from('donations').select('*').order('date',{ascending:false});const total=donations?.filter(d=>d.status==='verified').reduce((s,d)=>s+parseFloat(d.amount||0),0)||0;area.innerHTML=`<h3>Donations — Verified Total: <span style="color:#1B5E20">${total.toFixed(3)} OMR</span></h3><div class="donation-highlight"><strong>Add Manual Entry:</strong><div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px"><input type="text" id="new_donor" placeholder="Donor name" style="flex:1;margin:0"><input type="number" id="new_amt" placeholder="Amount" style="width:140px;margin:0" step="0.001"><button class="btn-success" style="width:auto" onclick="addDonation()">Add</button></div></div><table><thead><tr><th>Donor</th><th>Amount</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead><tbody>${donations?.length?donations.map(d=>`<tr><td>${d.donor_name||'Anon'}</td><td>${parseFloat(d.amount).toFixed(3)}</td><td>${new Date(d.date).toLocaleDateString()}</td><td><span class="badge badge-${d.status==='verified'?'approved':'pending'}">${d.status}</span></td><td>${d.status!=='verified'?`<button class="btn-success btn-small" onclick="verifyDonation('${d.id}')">✅</button>`:''}<button class="btn-danger btn-small" onclick="deleteDonation('${d.id}')">🗑️</button></td></tr>`).join(''):'<tr><td colspan="5" style="text-align:center;color:#666">No donations.</td></tr>'}</tbody></table>`;}
async function addDonation(){const name=document.getElementById('new_donor').value.trim()||'Anonymous';const amount=parseFloat(document.getElementById('new_amt').value);if(!amount||amount<=0){alert('Enter valid amount.');return;}await db.from('donations').insert([{donor_name:name,amount,date:new Date().toISOString(),status:'verified'}]);await adminTab('donations',null);}
async function verifyDonation(id){await db.from('donations').update({status:'verified'}).eq('id',id);await adminTab('donations',null);}
async function deleteDonation(id){if(!confirm('Delete?'))return;await db.from('donations').delete().eq('id',id);await adminTab('donations',null);}
async function adminElections(area){const {data:elections}=await db.from('elections').select('*').order('start_date',{ascending:false});const {data:approvedMembers}=await db.from('users').select('id,name').eq('status','approved');area.innerHTML=`<h3>Elections</h3><div class="donation-highlight"><strong>Create Election:</strong><input type="text" id="el_title" placeholder="Title" style="margin-top:8px"><div style="display:flex;gap:10px;flex-wrap:wrap"><div style="flex:1"><label>Start</label><input type="date" id="el_start"></div><div style="flex:1"><label>End</label><input type="date" id="el_end"></div></div><button class="btn-primary" style="width:auto;margin-top:8px" onclick="createElection()">Create</button></div><table><thead><tr><th>Title</th><th>Start</th><th>End</th><th>Actions</th></tr></thead><tbody>${elections?.length?elections.map(e=>`<tr><td>${e.title}</td><td>${new Date(e.start_date).toLocaleDateString()}</td><td>${new Date(e.end_date).toLocaleDateString()}</td><td><select id="cand_${e.id}" style="width:160px;margin:0;padding:6px;display:inline-block"><option value="">Add candidate...</option>${approvedMembers?.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select><button class="btn-success btn-small" onclick="addCandidate('${e.id}')">Add</button><button class="btn-danger btn-small" onclick="deleteElection('${e.id}')">🗑️</button></td></tr>`).join(''):'<tr><td colspan="4" style="text-align:center;color:#666">No elections.</td></tr>'}</tbody></table>`;}
async function createElection(){const title=document.getElementById('el_title').value.trim(),start=document.getElementById('el_start').value,end=document.getElementById('el_end').value;if(!title||!start||!end){alert('All fields required.');return;}await db.from('elections').insert([{title,start_date:start,end_date:end}]);await adminTab('elections',null);}
async function addCandidate(electionId){const userId=document.getElementById('cand_'+electionId).value;if(!userId){alert('Select member.');return;}const {error}=await db.from('candidates').insert([{election_id:electionId,user_id:userId,votes:0}]);if(error)alert('Error: '+error.message);else{alert('Added!');await adminTab('elections',null);}}
async function deleteElection(id){if(!confirm('Delete election?'))return;await db.from('elections').delete().eq('id',id);await adminTab('elections',null);}
async function adminCabinet(area){const {data:members}=await db.from('cabinet').select('*').order('order');area.innerHTML=`<h3>Cabinet</h3><div class="donation-highlight"><strong>Add Member:</strong><div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px"><input type="text" id="cab_name" placeholder="Full Name" style="flex:1;margin:0"><input type="text" id="cab_role" placeholder="Role" style="flex:1;margin:0"></div><textarea id="cab_bio" placeholder="Bio..." rows="2" style="margin-top:8px"></textarea><input type="text" id="cab_photo" placeholder="Photo URL (optional)"><input type="number" id="cab_order" placeholder="Display order" style="width:160px"><button class="btn-primary" style="width:auto" onclick="addCabinetMember()">Add</button></div><table><thead><tr><th>Name</th><th>Role</th><th>Order</th><th>Actions</th></tr></thead><tbody>${members?.length?members.map(m=>`<tr><td>${m.name}</td><td>${m.role}</td><td>${m.order}</td><td><button class="btn-danger btn-small" onclick="deleteCabinetMember('${m.id}')">🗑️</button></td></tr>`).join(''):'<tr><td colspan="4" style="text-align:center;color:#666">No members.</td></tr>'}</tbody></table>`;}
async function addCabinetMember(){const name=document.getElementById('cab_name').value.trim(),role=document.getElementById('cab_role').value.trim();if(!name||!role){alert('Name and role required.');return;}await db.from('cabinet').insert([{name,role,bio:document.getElementById('cab_bio').value.trim()||null,photo_url:document.getElementById('cab_photo').value.trim()||null,order:parseInt(document.getElementById('cab_order').value)||99}]);await adminTab('cabinet',null);}
async function deleteCabinetMember(id){if(!confirm('Delete?'))return;await db.from('cabinet').delete().eq('id',id);await adminTab('cabinet',null);}
async function adminNews(area){const {data:news}=await db.from('news').select('*').order('date',{ascending:false});area.innerHTML=`<h3>News</h3><div class="donation-highlight"><strong>Add News:</strong><input type="text" id="news_title" placeholder="Title" style="margin-top:8px"><textarea id="news_content" placeholder="Content..." rows="3"></textarea><button class="btn-primary" style="width:auto" onclick="addNews()">Publish</button></div><table><thead><tr><th>Title</th><th>Date</th><th>Actions</th></tr></thead><tbody>${news?.length?news.map(n=>`<tr><td>${n.title}</td><td>${new Date(n.date).toLocaleDateString()}</td><td><button class="btn-danger btn-small" onclick="deleteNews('${n.id}')">🗑️</button></td></tr>`).join(''):'<tr><td colspan="3" style="text-align:center;color:#666">No news.</td></tr>'}</tbody></table>`;}
async function addNews(){const title=document.getElementById('news_title').value.trim(),content=document.getElementById('news_content').value.trim();if(!title||!content){alert('Title and content required.');return;}await db.from('news').insert([{title,content,date:new Date().toISOString()}]);await adminTab('news',null);}
async function deleteNews(id){if(!confirm('Delete?'))return;await db.from('news').delete().eq('id',id);await adminTab('news',null);}
async function adminEvents(area){const {data:events}=await db.from('events').select('*').order('date',{ascending:false});area.innerHTML=`<h3>Events</h3><div class="donation-highlight"><strong>Add Event:</strong><input type="text" id="ev_title" placeholder="Title" style="margin-top:8px"><div style="display:flex;gap:10px;flex-wrap:wrap"><input type="date" id="ev_date" style="flex:1;margin:0"><input type="text" id="ev_time" placeholder="Time" style="flex:1;margin:0"></div><input type="text" id="ev_location" placeholder="Location" style="margin-top:8px"><textarea id="ev_desc" placeholder="Description..." rows="2"></textarea><button class="btn-primary" style="width:auto" onclick="addEvent()">Add</button></div><table><thead><tr><th>Title</th><th>Date</th><th>Location</th><th>Actions</th></tr></thead><tbody>${events?.length?events.map(e=>`<tr><td>${e.title}</td><td>${new Date(e.date).toLocaleDateString()}</td><td>${e.location||'–'}</td><td><button class="btn-danger btn-small" onclick="deleteEvent('${e.id}')">🗑️</button></td></tr>`).join(''):'<tr><td colspan="4" style="text-align:center;color:#666">No events.</td></tr>'}</tbody></table>`;}
async function addEvent(){const title=document.getElementById('ev_title').value.trim(),date=document.getElementById('ev_date').value;if(!title||!date){alert('Title and date required.');return;}await db.from('events').insert([{title,date,time:document.getElementById('ev_time').value.trim()||null,location:document.getElementById('ev_location').value.trim()||null,description:document.getElementById('ev_desc').value.trim()||null}]);await adminTab('events',null);}
async function deleteEvent(id){if(!confirm('Delete?'))return;await db.from('events').delete().eq('id',id);await adminTab('events',null);}
async function adminAnnouncements(area){const {data:ann}=await db.from('announcements').select('*').order('created_at',{ascending:false});area.innerHTML=`<h3>Announcements</h3><div class="donation-highlight"><strong>New Announcement:</strong><textarea id="ann_msg" placeholder="Message..." rows="2" style="margin-top:8px"></textarea><button class="btn-primary" style="width:auto" onclick="addAnnouncement()">Publish</button></div><table><thead><tr><th>Message</th><th>Active</th><th>Actions</th></tr></thead><tbody>${ann?.length?ann.map(a=>`<tr><td>${(a.message||'').substring(0,60)}</td><td>${a.is_active?'✅':'❌'}</td><td><button class="btn-success btn-small" onclick="toggleAnnouncement('${a.id}',${!a.is_active})">${a.is_active?'Off':'On'}</button><button class="btn-danger btn-small" onclick="deleteAnnouncement('${a.id}')">🗑️</button></td></tr>`).join(''):'<tr><td colspan="3" style="text-align:center;color:#666">None.</td></tr>'}</tbody></table>`;}
async function addAnnouncement(){const msg=document.getElementById('ann_msg').value.trim();if(!msg){alert('Enter message.');return;}await db.from('announcements').insert([{message:msg,is_active:true,created_at:new Date().toISOString()}]);await loadAnnouncements();await adminTab('announcements',null);}
async function toggleAnnouncement(id,val){await db.from('announcements').update({is_active:val}).eq('id',id);await loadAnnouncements();await adminTab('announcements',null);}
async function deleteAnnouncement(id){if(!confirm('Delete?'))return;await db.from('announcements').delete().eq('id',id);await loadAnnouncements();await adminTab('announcements',null);}
async function adminEmbassy(area){const {data:emb}=await db.from('embassy').select('*').limit(1);const e=emb?.[0]||{};area.innerHTML=`<h3>Embassy Info</h3><label>Address</label><textarea id="emb_addr" rows="2">${e.address||''}</textarea><label>Phone</label><input type="text" id="emb_phone" value="${e.phone||''}"><label>Email</label><input type="email" id="emb_email" value="${e.email||''}"><label>Hours</label><input type="text" id="emb_hours" value="${e.hours||''}"><label>Website</label><input type="text" id="emb_web" value="${e.website||''}"><button class="btn-primary" style="max-width:200px" onclick="saveEmbassy('${e.id||''}')">💾 Save</button>`;}
async function saveEmbassy(existingId){const payload={address:document.getElementById('emb_addr').value.trim(),phone:document.getElementById('emb_phone').value.trim(),email:document.getElementById('emb_email').value.trim(),hours:document.getElementById('emb_hours').value.trim(),website:document.getElementById('emb_web').value.trim()};if(existingId){await db.from('embassy').update(payload).eq('id',existingId);}else{await db.from('embassy').insert([payload]);}alert('✅ Saved!');}

window.showPage=showPage;window.doLogin=doLogin;window.doLogout=doLogout;window.doRegister=doRegister;
window.submitReport=submitReport;window.submitDonation=submitDonation;window.castVote=castVote;
window.adminTab=adminTab;window.adminApproveMember=adminApproveMember;window.adminRejectMember=adminRejectMember;
window.adminDeleteMember=adminDeleteMember;window.exportMembersCSV=exportMembersCSV;
window.resolveReport=resolveReport;window.deleteReport=deleteReport;
window.addDonation=addDonation;window.verifyDonation=verifyDonation;window.deleteDonation=deleteDonation;
window.createElection=createElection;window.addCandidate=addCandidate;window.deleteElection=deleteElection;
window.addCabinetMember=addCabinetMember;window.deleteCabinetMember=deleteCabinetMember;
window.addNews=addNews;window.deleteNews=deleteNews;window.addEvent=addEvent;window.deleteEvent=deleteEvent;
window.addAnnouncement=addAnnouncement;window.toggleAnnouncement=toggleAnnouncement;window.deleteAnnouncement=deleteAnnouncement;
window.saveEmbassy=saveEmbassy;

initSession();
</script>
