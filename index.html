<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oman Pakhtoon Community</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f0f2f5; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        header { background: #1B5E20; color: white; padding: 20px; text-align: center; }
        nav { background: #D32F2F; display: flex; justify-content: center; flex-wrap: wrap; }
        nav a { padding: 14px 20px; color: white; text-decoration: none; cursor: pointer; }
        nav a:hover { background: #B71C1C; }
        .card { background: white; padding: 20px; margin: 20px 0; border-radius: 8px; }
        .flex { display: flex; gap: 20px; flex-wrap: wrap; }
        .flex > div { flex: 1; }
        input, select, textarea, button { width: 100%; padding: 10px; margin: 8px 0; }
        button { background: #1B5E20; color: white; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #1B5E20; color: white; }
    </style>
</head>
<body>
<header>
    <h1>Oman Pakhtoon Community</h1>
    <p>سماجی خدمات اور یکجہتی فورم • وومن پختون</p>
</header>
<nav>
    <a onclick="showPage('home')">Home</a>
    <a onclick="showPage('register')">Register</a>
    <a onclick="showPage('reports')">Reports</a>
    <a onclick="showPage('donations')">Donations</a>
    <a onclick="showPage('elections')">Elections</a>
    <a onclick="showPage('cabinet')">Cabinet</a>
    <a onclick="showPage('admin')">Admin</a>
</nav>
<div class="container" id="content"></div>

<script>
    const SUPABASE_URL = 'https://wzaqiijdjzfxlnbxpqfr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6YXFpaWpkanpmeGxuYnhwcWZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MDc4MjYsImV4cCI6MjA5NjA4MzgyNn0.XTl9ukPQl3QwQVZjUYYGJh79j0k-gzLQNCebnInW_ic';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;

    async function checkSession() {
        const { data: { user } } = await supabase.auth.getUser();
        currentUser = user;
        return user;
    }

    async function isAdmin() {
        if (!currentUser) return false;
        const { data } = await supabase.from('users').select('role').eq('id', currentUser.id).single();
        return data?.role === 'admin';
    }

    async function showPage(page) {
        const content = document.getElementById('content');
        if (page === 'home') await renderHome(content);
        else if (page === 'register') await renderRegister(content);
        else if (page === 'reports') await renderReports(content);
        else if (page === 'donations') await renderDonations(content);
        else if (page === 'elections') await renderElections(content);
        else if (page === 'cabinet') await renderCabinet(content);
        else if (page === 'admin') await renderAdmin(content);
    }

    async function renderHome(container) {
        const { count: memberCount } = await supabase.from('users').select('*', { count: 'exact', head: true });
        const { data: donations } = await supabase.from('donations').select('amount');
        const totalDonations = donations?.reduce((s,d)=>s+(d.amount||0),0) || 0;
        const { data: embassy } = await supabase.from('embassy').select('*').limit(1);
        const embassyInfo = embassy?.[0] || { address: 'Villa No. 1297, Way No. 3119, Shatti Al-Qurm, Muscat', phone: '+968 2469 6140', email: 'parepmuscat@mofa.gov.pk', hours: 'Sun-Thu 8am-2pm' };
        container.innerHTML = `
            <div class="flex">
                <div class="card"><h3>Total Members</h3><p style="font-size:2em;">${memberCount || 0}</p></div>
                <div class="card"><h3>Total Donations</h3><p style="font-size:2em;">${totalDonations} OMR</p></div>
            </div>
            <div class="card"><h3>Pakistani Embassy</h3><p>${embassyInfo.address}<br>📞 ${embassyInfo.phone}<br>✉️ ${embassyInfo.email}<br>🕒 ${embassyInfo.hours}</p></div>
        `;
    }

    async function renderRegister(container) {
        if (currentUser) {
            container.innerHTML = `<div class="card"><p>Logged in. <a onclick="showPage('home')">Home</a></p></div>`;
            return;
        }
        container.innerHTML = `<div class="card"><h2>Register (5 OMR)</h2><form id="regForm"><input type="text" id="name" placeholder="Full Name" required><input type="email" id="email" placeholder="Email" required><input type="tel" id="phone" placeholder="Phone" required><button type="submit">Register</button></form></div>`;
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const { data, error } = await supabase.auth.signUp({ email, password: 'temp123' });
            if (error) alert(error.message);
            else {
                await supabase.from('users').insert([{ id: data.user.id, name, email, phone, role: 'member', status: 'pending' }]);
                alert('Registered! Awaiting admin approval.');
                showPage('home');
            }
        });
    }

    async function renderReports(container) {
        if (!currentUser) { container.innerHTML = `<div class="card"><p>Please login first.</p></div>`; return; }
        container.innerHTML = `<div class="card"><h2>Submit Report</h2><form id="repForm"><select id="type"><option>death</option><option>injury</option><option>lost</option></select><textarea id="desc" placeholder="Description" rows="3"></textarea><input type="date" id="date"><input type="text" id="loc" placeholder="Location"><input type="text" id="contact" placeholder="Contact"><button type="submit">Submit</button></form></div><div class="card"><h3>Your Reports</h3><div id="repList"></div></div>`;
        document.getElementById('repForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await supabase.from('reports').insert([{ userId: currentUser.id, type: document.getElementById('type').value, description: document.getElementById('desc').value, date: document.getElementById('date').value, location: document.getElementById('loc').value, contactInfo: document.getElementById('contact').value }]);
            alert('Report submitted');
            loadReps();
        });
        async function loadReps() {
            const { data } = await supabase.from('reports').select('*').eq('userId', currentUser.id);
            document.getElementById('repList').innerHTML = `<table><th>Type</th><th>Description</th><th>Status</th></tr>${data?.map(r => `<tr><td>${r.type}</td><td>${r.description}</td><td>${r.status}</td></tr>`).join('')}~`;
        }
        loadReps();
    }

    async function renderDonations(container) {
        const { data: donations } = await supabase.from('donations').select('*').order('date', { ascending: false });
        container.innerHTML = `<div class="card"><h2>Donate</h2><p>Bank: 01011503131001, Holder: Ikram Bacha</p><form id="donForm"><input type="text" id="donor" placeholder="Your Name"><input type="number" id="amt" placeholder="Amount"><button type="submit">Record Donation</button></form></div><div class="card"><h3>History</h3><div id="donList"></div></div>`;
        document.getElementById('donForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await supabase.from('donations').insert([{ donorName: document.getElementById('donor').value, amount: parseFloat(document.getElementById('amt').value), date: new Date() }]);
            alert('Donation recorded');
            renderDonations(container);
        });
        document.getElementById('donList').innerHTML = `<table><th>Donor</th><th>Amount</th><th>Date</th></tr>${donations?.map(d => `<tr><td>${d.donorName}</td><td>${d.amount}</td><td>${new Date(d.date).toLocaleDateString()}</td></tr>`).join('')}~`;
    }

    async function renderElections(container) {
        const { data: elections } = await supabase.from('elections').select('*');
        container.innerHTML = `<div class="card"><h2>Elections</h2><div>${elections?.map(e => `<div>${e.title} - ends ${new Date(e.endDate).toLocaleDateString()} <button onclick="alert('Vote demo')">Vote</button></div>`).join('') || 'No active elections'}</div></div>`;
    }

    async function renderCabinet(container) {
        const { data: members } = await supabase.from('cabinet').select('*');
        container.innerHTML = `<div class="card"><h2>Cabinet</h2><div class="flex">${members?.map(m => `<div class="card"><img src="${m.photoUrl || 'https://via.placeholder.com/100'}" width="100"><h3>${m.name}</h3><p>${m.role}</p></div>`).join('') || 'No cabinet members'}</div></div>`;
    }

    async function renderAdmin(container) {
        if (!await isAdmin()) { container.innerHTML = `<div class="card"><p>Admin only</p></div>`; return; }
        const { data: pending } = await supabase.from('users').select('*').eq('status', 'pending');
        container.innerHTML = `<div class="card"><h2>Admin</h2><h3>Pending approvals</h3><div id="pendingList"></div><button onclick="exportCSV()">Export CSV</button></div>`;
        document.getElementById('pendingList').innerHTML = `<table><th>Name</th><th>Email</th><th>Phone</th><th>Action</th></tr>${pending?.map(u => `<tr><td>${u.name}</td><td>${u.email}</td><td>${u.phone}</td><td><button onclick="approve('${u.id}')">Approve</button> <button onclick="reject('${u.id}')">Reject</button></td></tr>`).join('')}~`;
    }
    window.approve = async (id) => { await supabase.from('users').update({ status: 'approved' }).eq('id', id); alert('Approved'); renderAdmin(document.getElementById('content')); };
    window.reject = async (id) => { await supabase.from('users').update({ status: 'rejected' }).eq('id', id); alert('Rejected'); renderAdmin(document.getElementById('content')); };
    window.exportCSV = async () => {
        const { data } = await supabase.from('users').select('name, email, phone, status');
        let csv = 'Name,Email,Phone,Status\n' + data.map(u => `"${u.name}",${u.email},${u.phone},${u.status}`).join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'members.csv';
        a.click();
    };

    checkSession().then(() => showPage('home'));
</script>
</body>
</html>
