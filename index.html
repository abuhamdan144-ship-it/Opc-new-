<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oman Pakhtoon Community</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background: #f0f2f5; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        header { background: #1B5E20; color: white; padding: 20px; text-align: center; position: relative; }
        .lang-switch { position: absolute; top: 20px; right: 20px; background: #FFD700; padding: 5px 10px; border-radius: 5px; }
        .lang-switch select { background: #1B5E20; color: white; border: none; padding: 5px; border-radius: 4px; cursor: pointer; }
        nav { background: #D32F2F; overflow: auto; display: flex; flex-wrap: wrap; justify-content: center; }
        nav a { padding: 14px 20px; color: white; text-decoration: none; display: inline-block; cursor: pointer; }
        nav a:hover { background: #B71C1C; }
        .card { background: white; padding: 20px; margin: 20px 0; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .flex { display: flex; flex-wrap: wrap; gap: 20px; }
        .flex > div { flex: 1; min-width: 250px; }
        input, select, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        button { background: #1B5E20; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0D3B0F; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #1B5E20; color: white; }
    </style>
</head>
<body>
<header>
    <h1>Oman Pakhtoon Community</h1>
    <p>سماجی خدمات اور یکجہتی فورم • وومن پختون</p>
    <div class="lang-switch">
        <select id="languageSelect">
            <option value="en">English</option>
            <option value="ur">اردو</option>
            <option value="ps">پښتو</option>
        </select>
    </div>
</header>
<nav>
    <a onclick="showPage('home')">Home</a>
    <a onclick="showPage('register')">Register (5 OMR)</a>
    <a onclick="showPage('reports')">Reports</a>
    <a onclick="showPage('donations')">Donations</a>
    <a onclick="showPage('elections')">Elections</a>
    <a onclick="showPage('cabinet')">Cabinet</a>
    <a onclick="showPage('admin')">Admin</a>
</nav>
<div class="container" id="content"></div>

<script>
    const SUPABASE_URL = 'https://wzaqiijdjzfxlnbxpqfr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6YXFpaWpkanpmeGxuYnhwcWZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MDc4MjYsImV4cCI6MjA5NjA4MzgyNn0.XTl9ukPQl3QwQVZjUYYGJh79j0k-gzLQNCebnInW_ic';
    const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;

    // Helper translations (simple)
    const t = (key) => ({ home:'Home', register:'Register', reports:'Reports', donations:'Donations', elections:'Elections', cabinet:'Cabinet', admin:'Admin' }[key] || key);

    async function checkSession() { const { data: { user } } = await supabase.auth.getUser(); currentUser = user; }
    async function isAdmin() { if (!currentUser) return false; const { data } = await supabase.from('users').select('role').eq('id', currentUser.id).single(); return data?.role === 'admin'; }

    async function showPage(page) {
        const content = document.getElementById('content');
        if (page === 'home') await renderHome(content);
        else if (page === 'register') await renderRegister(content);
        else if (page === 'reports') await renderReports(content);
        else if (page === 'donations') await renderDonations(content);
        else if (page === 'elections') await renderElections(content);
        else if (page === 'cabinet') await renderCabinet(content);
        else if (page === 'admin') await renderAdmin(content);
    }

    async function renderHome(container) {
        const { count: memberCount } = await supabase.from('users').select('*', { count: 'exact', head: true });
        const { data: donations } = await supabase.from('donations').select('amount');
        const totalDonations = donations?.reduce((s,d)=>s+(d.amount||0),0) || 0;
        const { data: embassy } = await supabase.from('embassy').select('*').limit(1);
        const embassyInfo = embassy?.[0] || { address: 'Villa No. 1297, Way No. 3119, Shatti Al-Qurm, Muscat', phone: '+968 2469 6140', email: 'parepmuscat@mofa.gov.pk', hours: 'Sun-Thu 8am-2pm' };
        container.innerHTML = `
            <div class="flex">
                <div class="card"><h3>✅ Total Members</h3><p style="font-size:2.5em;">${memberCount || 0}</p></div>
                <div class="card"><h3>💰 Total Donations</h3><p style="font-size:2.5em;">${totalDonations} OMR</p></div>
            </div>
            <div class="card"><h3>🏛️ Pakistani Embassy</h3><p>📍 ${embassyInfo.address}<br>📞 ${embassyInfo.phone}<br>✉️ ${embassyInfo.email}<br>🕒 ${embassyInfo.hours}</p></div>
        `;
    }

    async function renderRegister(container) {
        if (currentUser) { container.innerHTML = `<div class="card"><p>You are already logged in. <a href="#" onclick="showPage('home')">Go Home</a></p></div>`; return; }
        container.innerHTML = `<div class="card"><h2>📝 Member Registration (5 OMR)</h2><form id="regForm"><input type="text" id="name" placeholder="Full Name" required><input type="email" id="email" placeholder="Email" required><input type="tel" id="phone" placeholder="Phone" required><button type="submit">Register & Pay 5 OMR (Mock)</button></form></div>`;
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value, email = document.getElementById('email').value, phone = document.getElementById('phone').value;
            const { data, error } = await supabase.auth.signUp({ email, password: 'temp123' });
            if (error) alert(error.message);
            else { await supabase.from('users').insert([{ id: data.user.id, name, email, phone, role: 'member', status: 'pending' }]); alert('Registration successful! Awaiting admin approval.'); showPage('home'); }
        });
    }

    async function renderReports(container) {
        if (!currentUser) { container.innerHTML = `<div class="card"><p>Please login/register first.</p></div>`; return; }
        container.innerHTML = `<div class="card"><h2>📢 Submit a Report</h2><form id="reportForm"><select id="type"><option>death</option><option>injury</option><option>lost</option></select><textarea id="description" placeholder="Description" rows="3" required></textarea><input type="date" id="date" required><input type="text" id="location" placeholder="Location"><input type="text" id="contact" placeholder="Contact Info"><button type="submit">Submit Report</button></form></div><div class="card"><h3>Your Reports</h3><div id="userReports"></div></div>`;
        document.getElementById('reportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const type = document.getElementById('type').value, description = document.getElementById('description').value, date = document.getElementById('date').value, location = document.getElementById('location').value, contactInfo = document.getElementById('contact').value;
            await supabase.from('reports').insert([{ userId: currentUser.id, type, description, date, location, contactInfo, status: 'pending' }]);
            alert('Report submitted');
            loadReports();
        });
        async function loadReports() { const { data } = await supabase.from('reports').select('*').eq('userId', currentUser.id); document.getElementById('userReports').innerHTML = `<table><th>Type</th><th>Description</th><th>Status</th><th>Date</th></tr>${data?.map(r => `<tr><td>${r.type}</td><td>${r.description}</td><td>${r.status}</td><td>${new Date(r.date).toLocaleDateString()}</td></tr>`).join('')}<table>`; }
        await loadReports();
    }

    async function renderDonations(container) {
        const { data: donations } = await supabase.from('donations').select('*').order('date', { ascending: false });
        container.innerHTML = `<div class="card"><h2>🤲 Support the Community</h2><p><strong>Bank Account:</strong> 01011503131001 &nbsp;|&nbsp; <strong>Holder:</strong> Ikram Bacha</p><p><strong>Mobile Transfer:</strong> <a href="tel:99111870">99111870</a></p><form id="donationForm"><input type="text" id="donorName" placeholder="Your Name" required><input type="number" id="amount" placeholder="Amount (OMR)" required><button type="submit">Record Donation</button></form></div><div class="card"><h3>Donation History</h3><div id="donationList"></div></div>`;
        document.getElementById('donationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const donorName = document.getElementById('donorName').value, amount = parseFloat(document.getElementById('amount').value);
            await supabase.from('donations').insert([{ donorName, amount, date: new Date(), status: 'pending' }]);
            alert('Donation recorded. Admin will verify.');
            renderDonations(container);
        });
        document.getElementById('donationList').innerHTML = `<tr><th>Donor</th><th>Amount (OMR)</th><th>Date</th><th>Status</th></tr>${donations?.map(d => `<tr><td>${d.donorName}</td><td>${d.amount}</td><td>${new Date(d.date).toLocaleDateString()}</td><td>${d.status}</td></tr>`).join('')}</tr>`;
    }

    async function renderElections(container) {
        const { data: elections } = await supabase.from('elections').select('*').order('endDate', { ascending: false });
        container.innerHTML = `<div class="card"><h2>🗳️ Elections</h2><div id="electionsList"></div></div>`;
        document.getElementById('electionsList').innerHTML = elections?.map(e => `<div><strong>${e.title}</strong> (ends ${new Date(e.endDate).toLocaleDateString()})<br><button onclick="vote('${e.id}')">Vote</button></div>`).join('') || '<p>No active elections.</p>';
    }
    window.vote = async (id) => { alert('Vote cast (demo)'); };

    async function renderCabinet(container) {
        const { data: members } = await supabase.from('cabinet').select('*').order('order');
        container.innerHTML = `<div class="card"><h2>👥 Cabinet Members</h2><div class="flex">${members?.map(m => `<div class="card"><img src="${m.photoUrl || 'https://via.placeholder.com/120'}" width="100"><h3>${m.name}</h3><p>${m.role}</p></div>`).join('') || '<p>No cabinet members yet.</p>'}</div></div>`;
    }

    async function renderAdmin(container) {
        if (!await isAdmin()) { container.innerHTML = `<div class="card"><p>⛔ Admin access only. <a href="#" onclick="showPage('home')">Return to Home</a></p></div>`; return; }
        const { data: pending } = await supabase.from('users').select('*').eq('status', 'pending');
        container.innerHTML = `<div class="card"><h2>🛡️ Admin Dashboard</h2><h3>Pending Approvals</h3><div id="pendingList"></div><button onclick="exportData()">📎 Export Members to CSV</button></div>`;
        document.getElementById('pendingList').innerHTML = `<tr><th>Name</th><th>Email</th><th>Phone</th><th>Action</th></tr>${pending?.map(m => `<tr><td>${m.name}</td><td>${m.email}</td><td>${m.phone}</td><td><button onclick="approveMember('${m.id}')">✅ Approve</button> <button onclick="rejectMember('${m.id}')">❌ Reject</button></td></tr>`).join('')}</table>`;
    }
    window.approveMember = async (id) => { await supabase.from('users').update({ status: 'approved' }).eq('id', id); alert('Approved'); renderAdmin(document.getElementById('content')); };
    window.rejectMember = async (id) => { await supabase.from('users').update({ status: 'rejected' }).eq('id', id); alert('Rejected'); renderAdmin(document.getElementById('content')); };
    window.exportData = async () => {
        const { data } = await supabase.from('users').select('name, email, phone, status');
        let csv = 'Name,Email,Phone,Status\n' + data.map(u => `"${u.name}",${u.email},${u.phone},${u.status}`).join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'members.csv';
        a.click();
    };

    checkSession().then(() => showPage('home'));
</script>
</body>
</html>
